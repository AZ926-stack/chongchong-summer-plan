<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冲冲的暑期计划</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f8f8f8; color: #333; padding: 16px; }
h1 { text-align: center; font-size: 20px; margin-bottom: 12px; color: #333; }

.week-nav { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 12px; }
.week-nav button { background: #4a90d9; color: #fff; border: none; border-radius: 6px; padding: 5px 14px; font-size: 13px; cursor: pointer; }
.week-nav button:disabled { background: #ccc; cursor: not-allowed; }
.week-nav span { font-size: 14px; font-weight: 600; }

table { width: 100%; border-collapse: collapse; background: #fff; table-layout: fixed; }
th, td { border: 1px solid #d0d0d0; padding: 6px 8px; font-size: 13px; text-align: center; vertical-align: middle; }
th { background: #f0f0f0; font-weight: 600; font-size: 12px; }

th.task-header, td.task-cell { text-align: left; font-weight: 600; background: #fafafa; width: 140px; }
td.task-cell { line-height: 1.4; }
td.task-cell .time { color: #666; font-size: 11px; display: block; }
td.task-cell .name { font-weight: 600; font-size: 13px; }

tr.cat-row td { background: #e8ecf1; font-weight: 700; font-size: 13px; text-align: left; padding: 4px 8px; }

th.hiking-col { background: #ffeaa7; }
th.sunday-col { background: #f0f0f0; }
th.today-col { background: #74b9ff; color: #fff; }

td.empty { background: #f9f9f9; }

.check { width: 22px; height: 22px; border: 2px solid #b2bec3; border-radius: 4px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; }
.check:hover { border-color: #4a90d9; }
.check.checked { background: #00b894; border-color: #00b894; }
.check.checked::after { content: "\2713"; color: #fff; font-size: 14px; font-weight: 700; }

.placeholder { color: #ccc; font-size: 12px; }

.star-input { width: 50px; border: 1px solid #d0d0d0; border-radius: 4px; padding: 3px 4px; font-size: 13px; text-align: center; font-family: inherit; }
.star-input:focus { border-color: #4a90d9; outline: none; }

tr.summary-row td { background: #e8f5e9; font-weight: 600; font-size: 12px; text-align: center; }
tr.summary-row td.summary-label { text-align: right; color: #555; padding-right: 10px; }
tr.summary-row td.summary-value { color: #00b894; font-size: 14px; font-weight: 700; }
tr.summary-row td.summary-reward { color: #e17055; font-size: 14px; font-weight: 700; }

.notes { margin-top: 16px; background: #fff; border-radius: 6px; padding: 12px; border: 1px solid #e0e0e0; }
.notes h3 { font-size: 13px; color: #666; margin-bottom: 6px; }
.notes p { font-size: 12px; line-height: 1.8; color: #555; }
.notes p span { color: #e17055; font-weight: 600; }

.review-section { margin-top: 16px; }
.review-day { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
.review-day h3 { font-size: 13px; color: #6c5ce7; margin-bottom: 6px; }
.review-prompts { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.review-item { display: flex; align-items: flex-start; gap: 4px; font-size: 12px; }
.review-item .emoji { font-size: 14px; flex-shrink: 0; }
.review-item textarea { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 4px 6px; font-size: 12px; resize: vertical; min-height: 28px; font-family: inherit; }

.progress-bar { margin-top: 10px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
.progress-bar .label { font-size: 12px; font-weight: 600; white-space: nowrap; }
.progress-track { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: #00b894; border-radius: 4px; transition: width 0.3s; }
.progress-bar .pct { font-size: 12px; font-weight: 700; color: #00b894; min-width: 32px; text-align: right; }

.sync-status { margin-top: 8px; text-align: center; font-size: 11px; color: #999; }
.sync-status.syncing { color: #4a90d9; }
.sync-status.error { color: #e17055; }
.sync-status.ok { color: #00b894; }

@media print {
  body { background: #fff; padding: 0; }
  .week-nav button { display: none; }
  .notes, .review-section, .progress-bar { page-break-inside: avoid; }
}

@media (max-width: 700px) {
  table { font-size: 11px; }
  th.task-header, td.task-cell { width: 100px; }
  .review-prompts { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>冲冲的暑期计划</h1>

<div class="week-nav">
  <button id="prevWeek" onclick="changeWeek(-1)">上一周</button>
  <span id="weekTitle"></span>
  <button id="nextWeek" onclick="changeWeek(1)">下一周</button>
</div>

<div class="progress-bar">
  <span class="label">本周完成</span>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <span class="pct" id="progressPct">0%</span>
</div>

<div id="calendar"></div>

<div class="review-section" id="reviewSection"></div>

<div class="notes">
  <h3>备注</h3>
  <p><span>1.</span> 爬山当天必打卡中文阅读，学习机数学和英语短文轮流做一项；爬山时只可听音乐，不可使用手机其他功能</p>
  <p><span>2.</span> 普陀山礼佛期间暂停各项打卡</p>
  <p><span>3.</span> 每天 21:30 复盘当天活动（主要做的事、最高兴的、最难过的、最遗憾的、最有成就感的）</p>
</div>

<div class="sync-status" id="syncStatus">云同步已就绪</div>

<script>
// ====== 飞书配置 ======
const FEISHU_APP_ID = 'cli_aac0f594aef85bfc';
const FEISHU_APP_SECRET = 'PV8APcW95DrrR31hCmAZyidgWt4ybe3j';
const BITABLE_APP_TOKEN = 'PgJRbQVkYaTOqpsvW5DcXRcwnsg';
const BITABLE_TABLE_ID = 'tblkF5TsalA70tGp';

// ====== 任务定义 ======
const TASKS = [
  { cat: '学习', name: '中文阅读', time: '7:40', id: 'cn_read' },
  { cat: '学习', name: '学习机数学', time: '8:15~9:00', id: 'study_machine' },
  { cat: '学习', name: '英语单词', time: '10:30', id: 'eng_words' },
  { cat: '学习', name: '猫果作业', time: '11:45~12:15', id: 'maoguo' },
  { cat: '学习', name: '英语课/英语短文', time: '20:30~20:55', id: 'eng_essay' },
  { cat: '学习', name: '周学习总结', time: '周六 18:00', id: 'weekly_summary', saturdayOnly: true },
  { cat: '家务', name: '扫地拖地', time: '周五/六（非爬山日）', id: 'sweep', choreDay: true },
  { cat: '家务', name: '做晚饭', time: '周五/六（非爬山日）', id: 'cook', choreDay: true },
  { cat: '家务', name: '洗内裤/袜子/眼镜', time: '每天', id: 'wash', dailyChore: true },
  { cat: '家务', name: '取包裹/扔垃圾', time: '每天', id: 'trash', dailyChore: true },
  { cat: '运动', name: '爬山', time: '周一/三/五或六', id: 'hiking' },
  { cat: '游戏', name: '王者大号升星', time: '每天', id: 'honor_stars', starInput: true },
  { cat: '复盘', name: '当天活动总结', time: '21:30', id: 'daily_review' },
];

const WEEKDAYS = ['一', '二', '三', '四', '五', '六', '日'];
const START_DATE = new Date(2026, 6, 18);
let currentWeekOffset = 0;

// ====== API 基础地址 ======
// 如果本机有服务器代理就用代理，否则直连飞书
const SERVER_URL = 'http://localhost:8765';
const API_BASE = SERVER_URL + '/api';
let USE_PROXY = false;

// 测试服务器是否可用
async function detectServer() {
  try {
    const resp = await fetch(SERVER_URL + '/api/records?page_size=1', { method: 'GET' });
    if (resp.ok) { USE_PROXY = true; return; }
  } catch (e) {}
  USE_PROXY = false;
}

// ====== 飞书 API 封装 ======
let accessToken = '';
let tokenExpiry = 0;

async function getFeishuToken() {
  if (accessToken && Date.now() < tokenExpiry) return accessToken;
  try {
    const resp = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app_id: FEISHU_APP_ID, app_secret: FEISHU_APP_SECRET })
    });
    const data = await resp.json();
    if (data.code === 0) {
      accessToken = data.tenant_access_token;
      tokenExpiry = Date.now() + (data.expire - 60) * 1000;
      return accessToken;
    }
  } catch (e) { console.error('Token error:', e); }
  return '';
}

async function bitableRequest(method, path, body) {
  let url, headers;
  if (USE_PROXY) {
    url = API_BASE + path;
    headers = { 'Content-Type': 'application/json' };
  } else {
    const token = await getFeishuToken();
    if (!token) return null;
    url = 'https://open.feishu.cn/open-apis/bitable/v1/apps/' + BITABLE_APP_TOKEN + '/tables/' + BITABLE_TABLE_ID + path;
    headers = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
  }
  try {
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(url, opts);
    return await resp.json();
  } catch (e) { console.error('API error:', e); return null; }
}

// ====== 云端数据读写 ======

function dateToTimestamp(dateStr) {
  return new Date(dateStr + 'T00:00:00+08:00').getTime();
}
let remoteRecords = {}; // key: "date_taskId" -> { record_id, checked, star, review }

async function syncFromCloud() {
  setStatus('syncing', '正在同步...');
  const data = await bitableRequest('GET', '/records?page_size=500');
  if (!data || data.code !== 0) { setStatus('error', '同步失败'); return; }
  remoteRecords = {};
  const items = data.data && data.data.items ? data.data.items : [];
  items.forEach(r => {
    const fields = r.fields;
    const date = fields['日期'];
    const taskId = fields['任务ID'];
    if (!date || !taskId) return;
    const key = date + '_' + taskId;
    remoteRecords[key] = {
      record_id: r.record_id,
      checked: fields['已打卡'] || false,
      star: fields['升星数'] || 0,
      review: fields['复盘'] || ''
    };
  });
  // 把云端数据同步到 localStorage
  Object.keys(remoteRecords).forEach(key => {
    const rec = remoteRecords[key];
    if (rec.checked) localStorage.setItem('chk_' + key, '1');
    else localStorage.removeItem('chk_' + key);
    if (rec.star) localStorage.setItem('star_' + key, String(rec.star));
    if (rec.review) {
      const parts = key.split('_');
      // review key format: date_review
    }
  });
  setStatus('ok', '已同步');
}

async function saveCheckToCloud(dateStr, taskId, checked) {
  const key = dateStr + '_' + taskId;
  setStatus('syncing', '保存中...');
  if (remoteRecords[key]) {
    await bitableRequest('PUT', '/records/' + remoteRecords[key].record_id, {
      fields: { '已打卡': checked }
    });
  } else {
    const resp = await bitableRequest('POST', '/records', {
      fields: { '日期': dateToTimestamp(dateStr), '任务ID': taskId, '已打卡': checked }
    });
    if (resp && resp.code === 0) {
      remoteRecords[key] = { record_id: resp.data.record.record_id, checked, star: 0, review: '' };
    }
  }
  setStatus('ok', '已保存');
}

async function saveStarToCloud(dateStr, val) {
  const key = dateStr + '_honor_stars';
  setStatus('syncing', '保存中...');
  if (remoteRecords[key]) {
    await bitableRequest('PUT', '/records/' + remoteRecords[key].record_id, {
      fields: { '升星数': val }
    });
  } else {
    const resp = await bitableRequest('POST', '/records', {
      fields: { '日期': dateToTimestamp(dateStr), '任务ID': 'honor_stars', '升星数': val }
    });
    if (resp && resp.code === 0) {
      remoteRecords[key] = { record_id: resp.data.record.record_id, checked: false, star: val, review: '' };
    }
  }
  setStatus('ok', '已保存');
}

async function saveReviewToCloud(dateStr, text) {
  const key = dateStr + '_daily_review';
  setStatus('syncing', '保存中...');
  if (remoteRecords[key]) {
    await bitableRequest('PUT', '/records/' + remoteRecords[key].record_id, {
      fields: { '复盘': text }
    });
  } else {
    const resp = await bitableRequest('POST', '/records', {
      fields: { '日期': dateToTimestamp(dateStr), '任务ID': 'daily_review', '复盘': text }
    });
    if (resp && resp.code === 0) {
      remoteRecords[key] = { record_id: resp.data.record.record_id, checked: false, star: 0, review: text };
    }
  }
  setStatus('ok', '已保存');
}

function setStatus(cls, msg) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + cls;
  el.textContent = msg;
}

// ====== 本地逻辑（保留原有） ======
function getMonday(offset) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + offset * 7);
  const dow = d.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  d.setDate(d.getDate() + diff);
  return d;
}

function dateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function isHikingDay(d) {
  const key = dateKey(d);
  if (localStorage.getItem('pause_' + key) === '1') return false;
  const dayNum = Math.floor((d - START_DATE) / 86400000);
  if (dayNum < 0) return false;
  const dow = d.getDay();
  if (dow === 1 || dow === 3 || dow === 6) return true;
  if (dow === 5) {
    const sat = new Date(d);
    sat.setDate(sat.getDate() + 1);
    const satKey = dateKey(sat);
    const satPaused = localStorage.getItem('pause_' + satKey) === '1';
    return satPaused;
  }
  return false;
}

function getStorage(key) {
  return localStorage.getItem('chk_' + key) === '1';
}

function toggleCheck(dateStr, taskId) {
  const key = dateStr + '_' + taskId;
  const newVal = !getStorage(key);
  localStorage.setItem('chk_' + key, newVal ? '1' : '0');
  render();
  saveCheckToCloud(dateStr, taskId, newVal);
}

function togglePause(dateStr) {
  const key = 'pause_' + dateStr;
  localStorage.setItem(key, localStorage.getItem(key) === '1' ? '0' : '1');
  render();
}

function toggleHikingSwitch(dateStr) {
  const d = new Date(dateStr);
  const dow = d.getDay();
  if (dow !== 5 && dow !== 6) return;
  const other = new Date(d);
  if (dow === 5) other.setDate(other.getDate() + 1);
  else other.setDate(other.getDate() - 1);
  const otherKey = dateKey(other);
  const otherPaused = localStorage.getItem('pause_' + otherKey) === '1';
  const thisKey = dateKey(d);
  const thisPaused = localStorage.getItem('pause_' + thisKey) === '1';
  if (dow === 5) {
    if (thisPaused) localStorage.setItem('pause_' + thisKey, '0');
    if (!otherPaused) localStorage.setItem('pause_' + otherKey, '1');
  } else {
    if (thisPaused) localStorage.setItem('pause_' + thisKey, '0');
    if (!otherPaused) localStorage.setItem('pause_' + otherKey, '1');
  }
  render();
}

function cellHTML(dateStr, taskId, checked) {
  return '<div class="check ' + (checked ? 'checked' : '') + '" onclick="toggleCheck(\'' + dateStr + '\',\'' + taskId + '\')"></div>';
}

function starInputHTML(dateStr) {
  const val = localStorage.getItem('star_' + dateStr) || '';
  return '<input class="star-input" type="number" placeholder="0" value="' + val + '" onblur="saveStar(\'' + dateStr + '\',this.value)">';
}

function saveStar(dateStr, val) {
  const n = parseInt(val) || 0;
  localStorage.setItem('star_' + dateStr, n);
  render();
  saveStarToCloud(dateStr, n);
}

function getWeekStarTotal(monday) {
  let total = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    if (d < START_DATE) continue;
    const key = dateKey(d);
    const v = parseInt(localStorage.getItem('star_' + key)) || 0;
    total += v;
  }
  return total;
}

function render() {
  const monday = getMonday(currentWeekOffset);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const sun = days[6];
  document.getElementById('weekTitle').textContent =
    (monday.getMonth()+1) + '/' + monday.getDate() + ' - ' + (sun.getMonth()+1) + '/' + sun.getDate();
  document.getElementById('prevWeek').disabled = currentWeekOffset <= 0;

  const today = dateKey(new Date());

  let html = '<table><thead><tr><th></th>';
  days.forEach((d, i) => {
    const key = dateKey(d);
    const dow = d.getDay();
    const isToday = key === today;
    const isHiking = isHikingDay(d);
    let cls = '';
    if (isToday) cls = 'today-col';
    else if (isHiking) cls = 'hiking-col';
    else if (dow === 6) cls = 'sunday-col';
    const thClick = (dow === 5 || dow === 6) ? ' onclick="toggleHikingSwitch(\'' + key + '\')" style="cursor:pointer;" title="点击切换爬山日"' : '';
    html += '<th class="' + cls + '"' + thClick + '>' + (d.getMonth()+1) + '月' + d.getDate() + '日<br>周' + WEEKDAYS[i] + '</th>';
  });
  html += '</tr></thead><tbody>';

  let lastCat = '';
  let totalChecks = 0;
  let checkedCount = 0;

  TASKS.forEach(task => {
    if (task.cat !== lastCat) {
      html += '<tr class="cat-row"><td colspan="8">' + task.cat + '</td></tr>';
      lastCat = task.cat;
    }

    html += '<tr>';
    html += '<td class="task-cell"><span class="time">' + task.time + '</span><span class="name">' + task.name + '</span></td>';

    days.forEach((d, i) => {
      const key = dateKey(d);
      const dow = d.getDay();
      const isHiking = isHikingDay(d);
      const checked = getStorage(key + '_' + task.id);
      const paused = localStorage.getItem('pause_' + key) === '1';

      if (d < START_DATE) {
        html += '<td class="empty"><span class="placeholder">-</span></td>';
        return;
      }

      if (task.saturdayOnly && dow !== 6) {
        html += '<td class="empty"><span class="placeholder">-</span></td>';
        return;
      }

      if (task.starInput) {
        html += '<td>' + starInputHTML(key) + '</td>';
        return;
      }

      if (task.choreDay) {
        if (dow === 5 || dow === 6) {
          if (isHiking && !paused) {
            html += '<td class="empty"><span class="placeholder">-</span></td>';
          } else {
            totalChecks++;
            if (checked) checkedCount++;
            html += '<td>' + cellHTML(key, task.id, checked) + '</td>';
          }
        } else {
          html += '<td class="empty"><span class="placeholder">-</span></td>';
        }
        return;
      }

      if (task.id === 'hiking') {
        if (!isHiking || paused) {
          html += '<td class="empty" onclick="togglePause(\'' + key + '\')" style="cursor:pointer;" title="点击暂停/恢复爬山"><span class="placeholder">-</span></td>';
        } else {
          totalChecks++;
          if (checked) checkedCount++;
          html += '<td onclick="togglePause(\'' + key + '\')" style="cursor:pointer;" title="点击暂停/恢复爬山">' + cellHTML(key, 'hiking', checked) + '</td>';
        }
        return;
      }

      if (isHiking && !paused) {
        if (task.id === 'study_machine' || task.id === 'eng_words' || task.id === 'maoguo' || task.id === 'cn_read') {
          if (task.id === 'study_machine' || task.id === 'cn_read') {
            totalChecks++;
            if (checked) checkedCount++;
            html += '<td>' + cellHTML(key, task.id, checked) + '</td>';
          } else {
            html += '<td class="empty"><span class="placeholder">-</span></td>';
          }
          return;
        }
        if (task.id === 'eng_essay') {
          totalChecks++;
          if (checked) checkedCount++;
          html += '<td>' + cellHTML(key, task.id, checked) + '</td>';
          return;
        }
        if (task.id === 'weekly_summary') {
          totalChecks++;
          if (checked) checkedCount++;
          html += '<td>' + cellHTML(key, task.id, checked) + '</td>';
          return;
        }
        if (task.id === 'daily_review') {
          totalChecks++;
          if (checked) checkedCount++;
          html += '<td>' + cellHTML(key, task.id, checked) + '</td>';
          return;
        }
        if (task.dailyChore) {
          totalChecks++;
          if (checked) checkedCount++;
          html += '<td>' + cellHTML(key, task.id, checked) + '</td>';
          return;
        }
        html += '<td class="empty"><span class="placeholder">-</span></td>';
        return;
      }

      totalChecks++;
      if (checked) checkedCount++;
      html += '<td>' + cellHTML(key, task.id, checked) + '</td>';
    });

    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('calendar').innerHTML = html;

  // 周汇总（升星统计）
  const weekStars = getWeekStarTotal(monday);
  const weekReward = weekStars * 5;
  const oldSummary = document.getElementById('starSummary');
  if (oldSummary) oldSummary.remove();
  let summaryHtml = '<div class="progress-bar" id="starSummary">' +
    '<span class="label">王者升星</span>' +
    '<div class="progress-track"><div class="progress-fill" style="width:0%"></div></div>' +
    '<span class="pct" style="color:#333;font-weight:700;">本周 <strong>' + weekStars + '</strong> 颗星</span>' +
    '<span class="pct" style="color:' + (weekReward >= 0 ? '#00b894' : '#e17055') + ';margin-left:8px;">' + (weekReward >= 0 ? '+' : '') + weekReward + ' 元</span>' +
  '</div>';
  document.getElementById('calendar').insertAdjacentHTML('afterend', summaryHtml);

  // 进度
  const pct = totalChecks > 0 ? Math.round(checkedCount / totalChecks * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';

  // 复盘
  let reviewHtml = '';
  days.forEach((d, i) => {
    if (d < START_DATE) return;
    const key = dateKey(d);
    const rd = JSON.parse(localStorage.getItem('review_' + key) || '{}');
    reviewHtml += '<div class="review-day">' +
      '<h3>' + (d.getMonth()+1) + '月' + d.getDate() + '日 周' + WEEKDAYS[i] + '</h3>' +
      '<div class="review-prompts">' +
        '<div class="review-item"><span class="emoji">📋</span><textarea placeholder="主要做了什么..." onblur="saveReview(\'' + key + '\',\'main\',this)">' + (rd.main||'') + '</textarea></div>' +
        '<div class="review-item"><span class="emoji">😊</span><textarea placeholder="最高兴的事..." onblur="saveReview(\'' + key + '\',\'happy\',this)">' + (rd.happy||'') + '</textarea></div>' +
        '<div class="review-item"><span class="emoji">😢</span><textarea placeholder="最难过的事..." onblur="saveReview(\'' + key + '\',\'sad\',this)">' + (rd.sad||'') + '</textarea></div>' +
        '<div class="review-item"><span class="emoji">😔</span><textarea placeholder="最遗憾的事..." onblur="saveReview(\'' + key + '\',\'regret\',this)">' + (rd.regret||'') + '</textarea></div>' +
        '<div class="review-item"><span class="emoji">🏆</span><textarea placeholder="最有成就感的事..." onblur="saveReview(\'' + key + '\',\'proud\',this)">' + (rd.proud||'') + '</textarea></div>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('reviewSection').innerHTML = reviewHtml;
}

function saveReview(dateKey, field, textarea) {
  const data = JSON.parse(localStorage.getItem('review_' + dateKey) || '{}');
  data[field] = textarea.value;
  localStorage.setItem('review_' + dateKey, JSON.stringify(data));
  // 把所有复盘字段合并成一段文字上传
  const allReview = Object.values(data).filter(Boolean).join(' | ');
  saveReviewToCloud(dateKey, allReview);
}

function changeWeek(delta) {
  currentWeekOffset += delta;
  render();
}

// 初始化
if (!localStorage.getItem('initDone')) {
  localStorage.setItem('pause_2026-07-18', '1');
  localStorage.setItem('initDone', '1');
}

// 先渲染本地数据，再异步同步云端
render();
detectServer().then(() => syncFromCloud()).then(() => render());
</script>
</body>
</html>
